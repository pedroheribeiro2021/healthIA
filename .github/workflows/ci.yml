name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      # npm ci (não npm install): instala estritamente a partir do
      # lockfile, igual ao build da Vercel — pega lockfile incompleto
      # (ex.: faltando @next/swc-* de alguma plataforma) antes do deploy.
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
